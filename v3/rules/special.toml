[unit.resistance]
name = "Resistance"
short = "{version}[{N}]"
explanation = "Gives improved resilience versus {version} damage"

[unit.resistance.versions]
regular = "Any damage rolled on regular damage table of unspecified type is reduced by {N}. This does not include damage from any other type. "
psycic = "Any damage explicitly named psychic damage is reduced damage by {N}"
fire = "Any damage rolled by fire token is effect is reduced damage by {N}"
poison = "Any damage rolled by poison token effect reduced damage by {N}"
acid = "Any die rolled by acid or minor acid token are reduced by {N}."

