[assault]

[assault.reroll_assault]
name = "Ork Reroll Assault"
short = "[{N}]"
explanation = "Each natural 6 rolled in assault count as 2 hits. Further, any natural 6 rolled in assault lets you reroll {N} dice per wave of rerolls. Thus {N} may never be greater than the number of dice you have left. If any of the rerolled dice results in a natural 6, reroll again with a new wave of rerolls."

[assault.cunning_assault]
name = "Cunning Assault"
short = "[{N}]"
explanation = "For each {N} assault successes assigned to one mechanical unit in assault, add +1 to all future damage tokens. If you manage to inflict two or more +1 to future damage this way, the enemy is shaken. Multiple hits from multiple models with same ability stack."
example = "If you hit the an enemy with a unit which have Cunning Assault[1 per 2] 4 times, you will add two +1 to future damage tokens and the enemy is shaken."
description = "This represent any cunning way to take out heavily armored units in assaults, where regular hits would do little damage."

[assault.cunning_assault.variables]
N = { type = "int", min = 1, max = 4 }

[assault.cunning_assault_defence]
name = "Cunning Assault Defence"
short = "[{N}, {M}+]"
explanation = "Roll {N} dice, for each die at {M}+, the unit gets one less +1 to future damage due to cunning assault. If the number +1 to future damage caused by cunning assault is reduced to 1 or less, the unit is not schaken. This effect stack with multiple models having the same ability"

[assault.minor_acid]
name = "Assault minor acid"
short = "[1 for {N}]"
explanation = "Targets gets one minor token for each {N} hits."
token = "minor acid"

[assault.minor_acid.variables]
N = { type = "int", min = 1, max = 4 }

[assault.poison]
name = "Assault Poison"
short = "[{N}]][1 for {M}]"
explanation = "Targets gets one poison[N] token for each {M} hits."
token = "poison"

[assault.poison.variables]
N = { type = "int", values = [4, 6, 8, 10, 12] }
M = { type = "int", min = 1, max = 4 }

#ToDo
#This should be a unit ability, because it does not make sense models of the same unit  have different pre assault retreat
[assault.pre_assault_retreat]
name = "Assault preretreat"
short = "[{N}+]"
explanation = "In pre-assault phase you may roll a die. At N+ you may retreat before the assaults starts. Treat this as a regular reatreat but give or take no assault damage. This ability may only be used if the hex retreating into neither becomes overcrowded, is an illegal hex or contain enemies."

[assault.pre_assault_retreat.variables]
N = { type = "int", min = 1, max = 6 }

[unit]

[unit.forward_position]
name = "Forward Position"
short = "[N]"
explanation = "At setup this unit may setup upt to {N} hexes away from normal setup area."

[unit.forward_position.variables]
N = { type = "int", min = 1, max = 3 }

