[unit.heal]
name = "Heal"
short = "[{N}, {unit}, {phase}]"
explanation = """Healing only works on biological units and removing crippled crew for units with bio crew. You have{N}points to spend on the following actions:

- Degrade one poison token one step. (ie. d6 becomes d4 (d4 are removed)). Cost 1.
- Degrade one bleeding token one step. (ie d6 becomes d4 (d4 are removed)). Cost 1.
- Remove one +1 to future damage token. Cost 1.
- Neutrilize one minor acid. Cost 1.
- Extinguish one fire. Cost 3.
- Neutrilize one poison token: Cost 3.
- Remove one bleeding token: Cost 3.
- Degrade one acid to minor acid. Cost 4.
- Remove crippled crew token. Cost 4. 
"""

[unit.heal.variables]
N = {type = "int", min = 1, max = 10}
unit = {type = "str", values=["self", "any"]}
phase  = {type = "str", values=["1st Healing", "2nd Healing"]}

[unit.immunity]
name = "Immunity"
short = "Immunity [feature]"
explanation = ""
description = "Unit is completely immmune to given feature"

[unit.immunity.variables]
#Til Geir Arne: hmmm. Values burde her være en av de egenskapene som ligger her inne... eller fritekst og satse på at Hss gjør ting riktig???  # typos: ignore
feature = {type = "str" }

[unit.repair]
name = "Repair"
short = "[{N}, {unit}, {phase}]"
explanation = """Repear only works on mechanical and drone units. You have {N} points to spend on the following actions:

- Remove one +1 to future damage token. Cost 1. 
- Neutrilize one minor acid. Cost 1 
- Remove 1 shaken token to any unit which is not bio. Cost 1 
- Extinguish one fire. Cost 3. 
- Remove 1 crittical damage effect. Cost 3. 
- Degrade one acid to minor acid. Cost 4. 
"""

[unit.repair.variables]
N = { type = "int", min = 1, max = 10 }
unit = { type = "str", values = ["self", "any"] }
phase = { type = "str", values = ["1st Healing", "2nd Healing"] }

[unit.hide]
name = "Hide"
short = "{terrain}"
explanation = "If you are in {terrain} you may use the hide order: remove your unit from the board, replace it with a hidden token."

[unit.hide.variables]
#todo, complete list
terrain = { type = "str", values = ["ruin", "swamp", "forrest", "building"] }

[unit.terror]
name = "Terror"
short = "[range={N}][d{M}]"
explanation = "In agony 0, roll a d{M} psycic damage on any enemy unit within range of this unit."

[unit.terror.variables]
N = { type = "int", min = 1, max = 3 }
M = { type = "int", values = [4, 6, 8, 10, 12] }

[unit.fear]
name = "Fear"
short = "[d{N}]"
explanation = "In pre-assault phase, roll a d{N} psycic damage. If enemy becomes shaken (or already is), you get +100% to assault deflection"

[unit.fear.variables]
N = { type = "int", values = [4, 6, 8, 10, 12] }

[unit.evation]
name = "Evation"
short = "[{N}+]"
explanation = "Roll a die per area of effect damage. Ignore the damage at {N}+"

[unit.evation.variables]
N = { type = "int", min = 1, max = 6 }

[weapon]

[weapon.burst]
name = "Burst"
short = "[{N}]"
explanation = "This weapon can have, and must be loaded with {N} ammo to be fired. However, when the weapon is fired, it is fired {N} times (per model) at the same enemy unit."

[weapon.burst.variables]
N = { type = "int", min = 2, max = 10 }

[weapon.limited_ammo]
name = "Limited Ammo"
explanation = "This weapon may be fired a maximum of {N} times in a match. Starts the game with {N} ammo loaded"
short = "[{N}]"

[weapon.limited_ammo.variables]
N = { type = "int", min = 2, max = 10 }

[weapon.gear_disruption]
name = "Gear Disruption"
short = "[{N}+]"
explanation = "Only applies when target is a robot. Roll 1 + one die per minor acid token on target. The robot gets one shaken token per roll of {N}+. Major acid counts as 3 minor acid tokens in this regard. (1st shaken token is duplicated as always)"

[weapon.gear_disruption.variables]
N = { type = "int", min = 2, max = 10 }

[weapon.fire]
name = "Fire"
short = ""
explanation = "Any unit hit at least once (in assault or by range weapon) is set on fire"

[weapon.minor_acid]
name = "Minor Acid"
short = "Minor Acid"
explanation = "Target gets a minor acid token"
token = "minor_acid"

[weapon.poison]
name = "Poison"
short = "Poison {N}"
explanation = "Target gets a poison[{N}] token"
token = "poison"

[weapon.poison.variables]
N = { type = "int", min = 1, max = 12 }

[weapon.fumble]
name = "Fumble"
short = "Fumble"
explanation = "If you roll natural 1 for to hit, you fumble. Then, follow the rest of the special ability for the fumble"

[weapon.critical]
name = "Critical"
short = "Critical"
explanation = "If you are within normal range, roll a natural 6 for to hit and hit the enemy, you score a critical hit. Then apply special ability for the critical hit"
