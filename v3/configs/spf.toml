[paths]
project = "{project_path}"
armies = "{project_path}/armies"
races = "{project_path}/races"
rules = "{project_path}/rules"
templates = "{project_path}/templates"
prompts = "{project_path}/prompts"
output = "{project_path}/output"
candidates = "{project_path}/candidates"
assets = "{project_path}/assets"
workflows = "{project_path}/workflows"

[render.latex]
engine = "pdflatex"

[assets.lore]
count = 1

[assets.image]
count = 3
prompt = "{paths.prompts}/image.txt"
negative_prompt = "{paths.prompts}/image-negative.txt"

[assets.image.comfyui]
env = "local"
timeout_s = 1200

[assets.image.comfyui.local]
base_url = "http://127.0.0.1:8188"
workflow = "{paths.workflows}/local.json" # gitignored per-machine
refine_workflow = "{paths.workflows}/local-refine.json" # gitignored per-machine
api_key_env = "" # empty => no auth header

[assets.image.comfyui.cloud]
base_url = "https://cloud.comfy.org"
workflow = "{paths.workflows}/cloud.json"
refine_workflow = "{paths.workflows}/cloud-refine.json"
api_key_env = "SPF_COMFYUI_API_KEY"

[assets.model]
count = 2

[lint]
# Key spellings the linter expands before comparing against a display name.
aliases = { darkelf = "dark_elf" }
# Affixes a key may carry that its display name legitimately omits.
optional_key_prefixes = ["greater_"]
optional_key_suffixes = ["_free"]
# Words that must stay lowercase anywhere but the start of a name.
function_words = ["of", "with", "in"]
