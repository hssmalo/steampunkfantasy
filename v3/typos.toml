[files]
# card_standar.tex is a legacy flacards sample kept for reference; its filename
# misspelling is not ours to rename (superseded by templates/latex/cards/).
extend-exclude = [
    "rules/todo.md",
    "templates/card_standar.tex",
    # Third-party ComfyUI exports: the embedded positive-prompt text is data the
    # Service overwrites at generate time, not prose we maintain.
    "workflows/cloud.json",
    "workflows/local.example.json",
    # An ADR about a typo will always contain that typo.
    "docs/adr/0011-coverage-survey-of-assets.md",
]

[default]
# Ignore any line ending with `# typos: ignore`
extend-ignore-re = ["(?Rm)^.*(#|//)\\s*typos:\\s*ignore$"]

[default.extend-words]
# Domain misspellings the default `typos` dictionary does not catch. `just spell`
# flags them; `just spell-fix` rewrites every occurrence repo-wide, including
# inside identifier keys — run `just check` afterward to confirm nothing desynced.
#
# Matching is word-level, *after* typos splits on `_` and camelCase. So `cracle`
# never reaches `tentacle_craclespears`: `craclespears` is one token there. Hence
# exact-token entries alongside a base word — they are not duplicates, and
# deleting one as redundant silently stops guarding the compound.
#
# `extend-words` also rejects the multi-correction array form, so there is no
# flag-but-do-not-fix option; leave uncertain candidates out entirely.
