[equipment.gasmask]
name = "GasMask assault training"
race = "darkelf"
cost.xp = 1
upgrade_all = true
requires = [["Independent:1"], ["type:Roboprosthetic", "type:Infantry", "type:Cavalry"]]

[equipment.gasmask.unit_special]

"Immunity" = "Unit becomes immune to poison clouds"

[equipment.gasmask.assault.special]
"Bonus" = "When assaulting hexes with poison cloud +50\\% in assault and assault deflection"
"Improved Extra Damage" = "In poison clouds you gain Poison[X][1 of 2] where X= the power of the poison gas in assaults"


[equipment.poison_fog_grenade]
name = "Poison Fog Grenade"
race = "darkelf"
cost.cp = 2
upgrade_all = true

requires = [["Independent:1"], ["type:Roboprosthetic", "type:Infantry", "type:Cavalry"]]

[equipment.poison_fog_grenade.unit_special]
"Fire Order" = "Use once per game, use an throw fire order to place 2 smoke tokens and 2 poison cloud[6] tokens in either an adjacent hex or the hex you are standing in. Note that this does not make you immune to the effect of your own grenade."
"Improved Hide" = "If you also have the hide order available, you may use the it order regardless of terrain if you are either standing in a hex with fog, or you are outside line of sight of any enemy unit."


[equipment.poison_fog_grenade.orders_gained.fire]
still = [["-", "Throw"], ["Throw", "-"]]
slow = [["-", "Throw"], ["Throw", "-"]]

