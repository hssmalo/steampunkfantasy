[units.elf_hydra]
race = "elf"
name = "Elf Hydra"
models = ["elf_hydra", "hydra_crew", "hydra_crew", "hydra_crew", "hydra_crew"]
size = "Huge"
cost.mp = 24
cost.xp = 96

description = '''Huge regenerating Hydra with 1 major head and 6 minor heads, with 4 elves riding on the hydra. The elf are really small compared to the hydra. Major head has an acid breath, minor heads spits poison, while the four elf wields a bow each. Elf are elegant and smooth.'''


[units.elf_hydra.shaken]
speed = "slow"
movement_order = ["-", "-", "flee"]

[units.elf_hydra.special]
"Regeneration" = "Heal[N, self, 2nd Healing], where N is one per minor head plus 4 for the major head. (N is 10 when all minor heads are alive). Instead of Healing normal effect, you may use 4 points to heal a destroyed head"
"Heads" = "1 major head, 6 minor head. Keep track of number of alive heads at any time, Poison spits, regeneration and assault is dependent on the number of alive heads."
"Fire Order" = "Crew fire elf bows each gunnery phase independent of fire orders. Breath weapon and poison spit always treated as loaded"
"Forward Position" = "[1]"

[units.elf_hydra.orders.fire]
still = [["Fire", "-"], ["-", "Fire"]]
slow = [["Fire", "-"], ["-", "Fire"]]

[units.elf_hydra.orders.movement]
slow = [["360°", "F", "360°"], ["360°", "F", "B"]]
still = [["360°", "360°", "360°"], ["360°", "A ", "F"]]

[units.elf_hydra.damage_tables.Regular]
rows = [
	"1-2: Bleed[4]",
	"3-5: +1 to future damage, Bleed[4]",
	"6-10: +1 to future damage, Bleed[6], destroy one minor head. If all minor heads are destroyed, add additional +3 to future damage instead. Amplify all bleeding one step. (4 to 6, 6 to 8, 8 to 10 and 10 to 12)",
	"10-17: As below, d6 Psychic damage",
	"18: Unit destroyed",
]
notes = [
	"Bleed does not cause more bleeding",
]

[units.elf_hydra.damage_tables.Psychic]
rows = [
	"6+: shaken",
]

