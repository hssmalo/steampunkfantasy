[races]

[races.goblin]
name = "Goblin"

description = "Goblin are small humanoid creatures, about 1m in height. Sneaky infantry, viewed as somewhat primitive but has proven to have done some surprisingly well done engineering jobs"

[spawns.tiny_snake]
unit = "tiny_snake"


[units]

[units.goblin_infantry]
race = "goblin"
name = "Goblin Infantry"
models = [
	"goblin_infantry",
	"goblin_infantry",
	"goblin_infantry",
	"goblin_infantry"
]
size = "Small"
cost.mp = 8

description = '''A Goblin armed with bow and grenades. Goblin are small in size, excellent in sneaking and avoiding danger.
'''

lore = '''
They are viewed as somewhat primitive by the standards of other races, and they are easily underestimated, until the Goblin infantry swarm you.
'''

tip = '''These are cheap and durable infantry which you may use to swarm the enemy. And especially with some upgrades and support, goblin infantry can be deadly. Consider if you want to combine these units with some motorized transport. In game terms you do want to come close and personal to the enemy, but avoid assaults. Luckily they are hard to hit and can evade incoming bombs.
'''


[units.goblin_infantry.shaken]
speed = "slow"
movement_order = ["-", "-", "Flee"]

#sneak: +1 to hit, 0 to be hit
[units.goblin_infantry.special]
"Take Cover" = "[sneak][-2]"
"Fire Order" = "You may either fire a regular arrow, a special arrow (arrow with limited ammo) or use one thrown weapon with each fire order."
"Evation" = "[4+]"

[units.goblin_infantry.orders.fire]
sneak = [["Fire", "Fire"]]

[units.goblin_infantry.orders.movement]
still = [["360°", "360°", "360°"], ["360°", "F", "360°"]]
slow  = [["360°", "F", "B"]]

[units.goblin_infantry.damage_tables.Regular]
rows = [
	"0-5: Kill 1 model",
	"6-7: Kill 1 model, Psychic damage[d6]",
	"8+: Unit destroyed",
]
notes = [
	"If one model is killed remove half of the +1 future damage tokens and if killed by bleeding/poison, remove that bleeding/poison token",
]

[units.goblin_infantry.damage_tables.Psychic]
rows = [
	"4+: shaken",
]




[units.gigant_snake_cavalry]
race = "goblin"
name = "Giant Snake Cavalry"
models = ["gigant_snake_cavalry"]
size = "Large"
cost.mp = 4
cost.xp = 24

description = '''Two Goblin wielding a bow each riding one giant scary snake.
They also carry tiny snakes which are launched by special arrows carried by the goblin. Where applied in large numbers, the battlefield is littered with these tiny snakes, hiding in the grass below.
'''

lore = '''
A terrifying view for all enemies, which the goblin enjoys a lot since it is an unusual that any goblin in clear sight are scary.
'''

tip = '''
Decent endurance, decent in assault with an devastating poison if they hit, and not to expensive. However their low speed, combined with low range limits the usefulness. The large number of tiny snakes are the real power of this unit.
'''


[units.gigant_snake_cavalry.shaken]
speed = "slow"
movement_order = ["-", "-", "Flee"]

[units.gigant_snake_cavalry.special]
"Fire Order" = "You may either fire two regular arrows or one special arrow (arrow with limited ammo)."
"Forward Position" = "[1]"
"Terror" = "[6](range=1)"

[units.gigant_snake_cavalry.orders.fire]
still = [["Fire", "Fire"]]

[units.gigant_snake_cavalry.orders.movement]
