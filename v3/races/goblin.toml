[units.bipedal_mech]
race = "goblin"
name = "Bipedal Mech"
models = ["bipedal_mech"]
size = "Large"
armor = [8,8,8,6]
cost.ip = 24

description = '''Fairly well armored bipedal mechanised walker piloted by two goblin. On one side the bipedal mech has a big weapon which fires the dreaded stinkbomb at enemies, while on the left it is is armed with two light mortars.
'''

lore = '''These are the pride of goblin innovation, the first tank which walks on two legs. Or at least, that is what the goblin claim.
'''

tip = '''
Do not underestimate the stinkbombs, which are great versus infantry, tanks and vehicles. Versus biological units the stinkbombs poison the enemy, scare them, cover them in acid, and if you hit you get an area effect hopefully doing the same thing over again. Versus tanks with biological crew, the crew damage can be devastating too, especially versus tanks which are already shaken. It is useless versus drones and robots. Goblin do not know what aiming is, so fire load and repeat as often as possible.
'''

[units.bipedal_mech.shaken]
speed = "still"
movement_order = ["-", "-", "-"]

[units.bipedal_mech.special]
"Fire Order" = "Fire and load all weapons simultaneously. Fire stinkbomb in addition to two light mortars"
"Forward Position" = "[2]"

