cost.xp = 24
description = '''Two Goblin veilding a bow each riding one gigant snake. A terrifying view for all enemies, which is an unsuaualt treat for the goblin army. They also carry tiny snakes which are fired by special arrows carried by the goblin. Where applied in large numbers, the battlefield is littered with these tiny snake, hiding in the grass below. For the light hearted, even the tiny snake can be scary.

Decent endurence, decent in assault with an devastating poison if they hit, and not to expensive. However their low speed, combined with low range limits the usefulness of the gigant snake cavalry.
'''


