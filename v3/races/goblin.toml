	"1-6: Bleed[8]",
	"7-8: +1 to future damage, Bleed[8]",
	"9+: Unit destroyed",
]
notes = [
	"Bleeding does not cause more bleeding",
]

[units.gigant_snake_cavalry.damage_tables.Psychic]
rows = [
	"6+: shaken",
]



