[races]

    [races.goblin]
    name = "Goblin"

[units]
	[goblin.units.goblin_infantry]
	race = "goblin"
	name = "Goblin Infantry"
	models = ["goblin_infantry","goblin_infantry","goblin_infantry","goblin_infantry"]
	size = "small"
	cost.mp = 2
	special =  ["Take Cover[still][-3]", "You may either fire an arrow or use one thrown weapon with each fire order."]
	shaken = "Movement set to slow. Movement order: [-,-,flee]. May not fire weapons"

	[goblin.units.goblin_infantry.orders.fire]
		     still = [["Fire", "Fire"]]
	[goblin.units.goblin_infantry.orders.movement]
		     still =[["360°","360°","360°"],[ "A+360°","F","B+360°"]]
		   
	[goblin.units.goblin_infantry.damage_tables]
		     regular = ["0-5: Kill 1 model", "6-7: Kill 1 model, psychic damage[d6]", "8+: Unit destroyed", "{{\\it Note: If one model is killed by bleeding/poison, remove that bleeding/poison \\\\ token and remove half of the +1 future damage tokens}}"]

		     psychic = ["4+: shaken"]

   [goblin.units.goblin_infantry_carrier]
    race = "goblin"
    name = "Goblin Infantry carrier"
    models = ["goblin_infantry_carrier"]
    size = "lagre"
    armor = [10, 6, 5, 4]
    cost.ip = 4
    special = ["May transport up to 3 Goblin infantry. Has Deploy[range=1] which may be used with Deploy orders", "Forward position[1]"]
    shaken  = "Speed set to still, move order: [- - -]. May not fire weapons"

        [goblin.units.goblin_infantry_carrier.orders.movement]
	slow = [["L/R","-","-"],
	     ["L/R","L/R","-"],
	     ["F","L/R","-"],
	     ["B","-","-"],
	     ["A+F", "F", "F+Deploy+B"],
	     ["F","-","-"],
	     ["B","-","-"]]
	     
	still = [["L/R","-","-"],["L/R","L/R","-"],["L/R","L/R","L/R"],["-","-","-"],["L/R","A","F"],["A","F","-"],["rev","-","-"]]

        [goblin.units.goblin_infantry_carrier.orders.fire]
	slow = [["-", "Load"],["-", "Fire"]]
	still = [["-", "Load"],["-", "Fire"]]

	[goblin.units.goblin_infantry_carrier.damage_tables]
	regular = [ "1-3: +1 to future damage",
		"4: as below, shaken",
		"5-8: as below, d6 critical damage",
		"9: Unit destroyed",]
	critical = [ "1-2: 1d4 damage to all transported units", "3: Forced Deploy (all units, empty hexes only)", "4: Cannot rotate", "5: Unit cannot Move ","6: set on fire"]
	crew = [ "4-5: Crippled Crew, if aleady shaken double initial crew damage", "6-7: as 4-5, shaken", "8-11: as 6-7, +3 to future crew damage", "12: Unit destroyed",]


[models]
	[goblin.models.goblin_infantry]
	name = "Goblin Infantry"
	race = "goblin"
	equipment_limit = ["independent:∞", "hands:2", "grenades:3", "specialization:1"]
	equipments = ["goblin_bow", "goblin_grenade"]
	type = ["Bio", "infantry", "Walks"]

	     [goblin.models.goblin_infantry.assault]
	     strength = [2,1,1,1]
	     strength_die = "6+"
	     deflection = [0, 0, 0, 0]
	     deflection_die = "6+"
	     damage = "d6-2"
	     ap = 2
	     special = ["Cunning Assault[1 for 2]", "Pre assault retreat: 6+"]


	[goblin.models.goblin_infantry_carrier]
	name = "Goblin Infantry Carrier"
	race = "goblin"
	equipments = ["light_mortar"]
	equipment_limit = ["independent:∞"]
	type = ["Vehicle", "Tank", "Track"]

	     [goblin.models.goblin_infantry_carrier.assault]
	     strength = [12,1,1,1]
	     strength_die = "6+"
	     deflection = [12, 0, 0, 0]
	     deflection_die = "6+"
	     damage = "d4-2"
	     ap = 2
	     special = []




	[goblin.models.elite_goblin_infantry]
	name = "Elite Goblin Infantry"
	race = "goblin"
	cost.xp = 1
	equipment_limit = ["independent:∞", "hands:2", "grenade:2"]
	equipments = ["goblin_bow"]
	type = ["Bio", "infantry", "elite","Walks"]
	replaces = ["goblin:infantry"]
	special = ["good shot: +3 to hit with trown weapons", "+1 to pre-assault retreat (per elite in unit)", "If unit contains atleast one elite, gain Psycic resitance[1]"]

	     [goblin.models.elite_goblin_infantry.assault]
	     strength = [2,1,1,1]
	     strength_die = "6+"
	     deflection = [4, 0, 0, 0]
	     deflection_die = "6+"
	     damage = "d4-2"
	     ap = 2
	     special = ["Cunning Assault[1 for 2]"]

[equipments]

   [goblin.equipments.goblin_bow]
    name = "Goblin bow"
    race = "goblin"
    requires = [["hands:2"], ["type:infantry"]]

    	     [goblin.equipments.goblin_bow.range]
	     range = 2
	     angle = [true, true, true, true]
	     damage = "d4-2"
	     ap = "1"
	     special = ["Always treated as loaded"]


   [goblin.equipments.gear_bow]
    name = "Gear bow"
    race = "goblin"
    cost.cp = 2
    requires = [["hands:2"], ["type:infantry"]]

    	     [goblin.equipments.gear_bow.range]
	     range = 3
	     angle = [true, true, true, true]
	     damage = "d4-2"
	     ap = "1"
	     special = ["Always treated as loaded", "Gear Disruption[6+]"]

   [goblin.equipments.poison_bow]
    name = "Poison bow"
    race = "goblin"
    cost.cp = 4
    requires = [["hands:2"], ["type:infantry"]]

    	     [goblin.equipments.poison_bow.range]
	     range = 2
	     angle = [true, true, true, true]
	     damage = "d4-2 + d4 crew damage"
	     ap = "1"
	     special = ["Always treated as loaded", "Poison[4]", "Crew damage improved to d8 if taget has atleast 2 Minor acid or 1 acid token"]



   [goblin.equipments.poison_dager]
    name = "Poison Dager"
    race = "goblin"
    cost.cp = 1
    requires = [["independent:1"], ["type:infantry"]]

    	     [goblin.equipments.poison_dager.assault]
	     deflection.add = [1, 0, 0, 0]
	     deflection_die.replace = "6+"
	     special.append = "Each deflected hit gives enemy poison[4]"




   [goblin.equipments.goblin_grenade]
    name = "Goblin Grenade"
    race = "goblin"
    requires = [["grenade:1"],["type:infantry"]]

    	     [goblin.equipments.goblin_grenade.range]
	     range = 1
	     angle = [true, true, true, true]
	     damage = "d6"
	     ap = 2
	     special = ["Thrown wapon"]

    [goblin.equipments.grenadier]
    name = "Grenadier (training)"
    race = "goblin"
    cost.xp = 2
    requires = [["specialization:1"],["type:infantry", "type:cavalry"]]
    special = ["For each fire order: fire a bow once and in adition each regular infantry may use one thrown weapon while elite infantry may use 2 thrown weapons (or the same twice)", "Get +1 to hit for thrown weapons"]


    [goblin.equipments.archer]
    name = "Archer spesialization"
    race = "goblin"
    cost.xp = 2
    requires = [["specialization:1"],["type:infantry", "type:cavalry"]]
    special = ["For each fire order: either fire a bow twice or use one thrown weapon per model"]


    [goblin.equipments.acid_grenade]
    name = "Acid Grenade"
    race = "goblin"
    cost.cp = 2
    requires = [["grenade:1"]]

    	     [goblin.equipments.acid_grenade.range]
	     range = 1
	     angle = [true, true, true, true]
	     damage = "n.a."
	     ap = 0
	     special = ["Thrown wapon", "No regular damage, but Minor Acid"]


    [goblin.equipments.poison_grenade]
    name = "Poison Grenade"
    race = "goblin"
    cost.cp = 2 
    requires = [["grenade:1"]]

    	     [goblin.equipments.poison_grenade.range]
	     range = 1
	     angle = [true, true, true, true]
	     damage = "d4 crew damage"
	     ap = 0
	     special = ["Thrown wapon", "Poison[4]", "Crew damage improved to d8 if target has atleast 2 Minor acid or 1 acid token"]


   [goblin.equipments.light_mortar]
    name = "Light Mortar"
    race = "goblin"


    	     [goblin.equipments.light_mortar.range]
	     range = 3
	     angle = [true, true, true, true]
	     damage = "d6 + d4 crew damage"
	     ap = 2
	     special = ["Poison[4]","Crew damage improved to d8 if target has atleast 2 Minor acid or 1 acid token"]




