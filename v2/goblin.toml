[races]

    [races.goblin]
    name = "Goblin"

[units]
	[goblin.units.goblin_infantry]
	race = "goblin"
	name = "Goblin Infantry"
	models = ["goblin_infantry","goblin_infantry","goblin_infantry","goblin_infantry"]
	size = "small"
	cost.mp = 2
	special =  ["Take Cover[still][-3]", "You may either fire an arrow or use one thrown weapon with each fire order.", "Evation[4+]"]
	shaken = "Movement set to slow. Movement order: [-,-,flee]. May not fire weapons"

	[goblin.units.goblin_infantry.orders.fire]
		     still = [["Fire", "Fire"]]
	[goblin.units.goblin_infantry.orders.movement]
		     still =[["360°","360°","360°"],[ "A+360°","F","B+360°"]]
		   
	[goblin.units.goblin_infantry.damage_tables]
		     regular = ["0-5: Kill 1 model", "6-7: Kill 1 model, psychic damage[d6]", "8+: Unit destroyed", "{{\\it Note: If one model is killed remove half of the +1 future damage tokens \\\\ and if killed by bleeding/poison, remove that bleeding/poison token}}"]

		     psychic = ["4+: shaken"]

   [goblin.units.goblin_infantry_carrier]
    race = "goblin"
    name = "Goblin Infantry carrier"
    models = ["goblin_infantry_carrier"]
    size = "lagre"
    armor = [10, 6, 5, 4]
    cost.ip = 4
    special = ["May transport up to 3 Goblin infantry. Has Deploy[range=1] which may be used with Deploy orders", "Forward position[1]"]
    shaken  = "Speed set to still, move order: [- - -]. May not fire weapons"

        [goblin.units.goblin_infantry_carrier.orders.movement]
	slow = [["L/R","-","-"],
	     ["L/R","L/R","-"],
	     ["F","L/R","-"],
	     ["B","-","-"],
	     ["A+F", "F", "F+Deploy+B"],
	     ["F","-","-"],
	     ["B","-","-"]]
	     
	still = [["L/R","-","-"],["L/R","L/R","-"],["L/R","L/R","L/R"],["-","-","-"],["L/R","A","F"],["A","F","-"],["rev","-","-"]]

        [goblin.units.goblin_infantry_carrier.orders.fire]
	slow = [["-", "Load"],["-", "Fire"]]
	still = [["-", "Load"],["-", "Fire"]]

	[goblin.units.goblin_infantry_carrier.damage_tables]
	regular = [ "1-3: +1 to future damage",
		"4: as below, shaken",
		"5-8: as below, d6 critical damage",
		"9: Unit destroyed",]
	critical = [ "1-2: 1d4 damage to all transported units", "3: Forced Deploy (all units, empty hexes only)", "4: Cannot rotate", "5: Unit cannot Move ","6: set on fire"]
	crew = [ "4-5: Crippled Crew, if aleady shaken double initial crew damage", "6-7: as 4-5, shaken", "8-11: as 6-7, +3 to future crew damage", "12: Unit destroyed",]



   [goblin.units.heavy_carrier]
    race = "goblin"
    name = "Heavy carrier"
    models = ["heavy_carrier"]
    size = "lagre"
    armor = [10, 8, 6, 4]
    cost.ip = 8
    special = ["May transport up to 1 Goblin infantry. Has Deploy[range=1, quick] which may be used with Deploy orders", "Forward position[1]", "Fire and load all weapons simultaniusly, with indentical ammo usage for all weapons"]
    shaken  = "Speed set to still, move order: [- - -]. May not fire weapons"

        [goblin.units.heavy_carrier.orders.movement]
	slow = [["L/R","-","-"],
	     ["L/R","L/R","-"],
	     ["F","L/R","-"],
	     ["F","L/R","Deploy"],
	     ["L/R","F","-"],
	     ["L/R","F","Deploy"],
	     ["B","-","-"],
	     ["A", "F", "-"],
	     ["F","-","-"],
	     ["B","-","-"]]
     	fast = [['F', 'F', 'F+Deploy'],
	     ['F', 'F', 'F'],
	     ['F', 'L/R', 'F+Deploy'],
     	     ['F', 'L/R', 'F'],
	     ['L/R', 'F', 'F'],
     	     ['L/R', 'F', 'F+Deploy'],
      	     ['F', 'F','L/R'],
	     ['F', 'F+Deploy', 'L/R'],
	     ['F', "B", "-"]]	

	still = [["L/R","-","-"],
	      ["L/R","L/R","-"],
	      ["L/R","L/R","L/R"],
	      ["-","-","-"],
	      ["L/R","A","F"],
	      ["A","F","-"],
	      ["rev","-","-"]]

        [goblin.units.heavy_carrier.orders.fire]
	fast = [["Load", "Fire"]]
	slow = [["Load", "Load"]]
	still = [["Load", "Load"]]

	[goblin.units.heavy_carrier.damage_tables]
	regular = [ "1-3: +1 to future damage",
		"4: as below, shaken",
		"5-8: as below, d6 critical damage",
		"9: Unit destroyed",]
	critical = [ "1: 1d4 damage to all transported units", "2: Forced Deploy (empty hexes only)", "3: +1 to be hit, -1 to hit", "4: Cannot rotate", "5: Unit cannot Move ","6: set on fire"]
	crew = [ "4-5: Crippled Crew, if aleady shaken double initial crew damage", "6-7: as 4-5, shaken", "8-11: as 6-7, +3 to future crew damage", "12: Unit destroyed",]


   [goblin.units.mechanical_fire_bird]
    race = "goblin"
    name = "Mechanical Fire Bird"
    models = ["mechanical_fire_bird"]
    size = "medium"
    armor = [5, 4, 4, 3]
    cost.ip = 6
    special = ["Starts the game with one reassemble token. If temporarily destroied in 2nd healing phase, you can use one reassemble token to become alive again. Set speed to fast_flying. If so, half (rounded down) all +1 to future damage token this unit has. If it does not have a reassemble token and and is not temporarily destroied at start of 2nd healing phase, gain one reassemble token. If, it is temporarily destroied and has no reassemble tokens in 2nd healing phase, this unit is permanently destroied.", "While temporarily destroied, count the model as laying still with movement [-,-,-]", "Immunity to fire"]
    shaken  = "Speed set to fast flying, move order: [- F F]. May not fire weapons"

        [goblin.units.mechanical_fire_bird.orders.movement]
	fast_flying = [["L/R+F","F", "F+L/R"], ["F", "F", "F"], ["F","L/R+F+L/R", "F"]]

        [goblin.units.mechanical_fire_bird.orders.fire]
	fast = [["-", "Load"],["-", "Fire"]]

	[goblin.units.mechanical_fire_bird.damage_tables]
	regular = ["1-3: +1 to future damage",
		"4-5: +2 to future damage",
		"6+: As below, temporarily destroied",
		"While temporarily destroied, all regular damage do inner damage instead",
		"{{\\it Note: + to future damage does not apply to inner damage}}",
		"{{\\it Note that it does not get the status temporarily destroied before the apply damage step}}"]



	inner = ["1-5: add one minor acid token",
	      "6+: Remove reassemble token"]





